# paper.yaml — 模拟盘 overlay
# 覆盖 thresholds.yaml 的部分字段，不覆盖整个配置。
# 由 config_loader 合并加载：base(thresholds.yaml) → overlay(paper.yaml)
#
# 模拟盘特点：
#   - 成本用悲观场景（滑点加倍+冲击）
#   - 仓位上限更保守（单只 15%）
#   - 启用尾盘强制平衡

cost_model:
  scenario: pessimistic

risk:
  max_position_pct: 0.15      # 单只持仓上限 15%
  max_t_size: 0.15            # 单次 T 操作上限 15%
  eod_force_flat: true        # 尾盘强制平衡
